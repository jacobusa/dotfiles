"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](sumi)\
$os\
$username\
[](bg:gold fg:sumi)\
$directory\
[](fg:gold bg:spring)\
$git_branch\
$git_status\
[](fg:spring bg:wave)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:wave bg:dragon)\
$docker_context\
[](fg:dragon bg:lotus)\
$time\
[ ](fg:lotus)\
$line_break$character
"""

palette = "kanagawa_gogh"

[palettes.kanagawa_gogh]

# Base
sumi = "#1F1F28"
dragon = "#2A2A37"
wave = "#363646"

# Foreground
fuji = "#DCD7BA"
oldwhite = "#C8C093"

# Accent colors
blue = "#7E9CD8"
purple = "#957FB8"
spring = "#98BB6C"
teal = "#6A9589"
red = "#E46876"
orange = "#FFA066"
gold = "#C0A36E"
lotus = "#D27E99"

[os]
disabled = false
style = "bg:sumi fg:fuji"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
Macos = "󰀵"
Linux = "󰌽"
Arch = "󰣇"
Debian = "󰣚"
Fedora = "󰣛"

[username]
show_always = true
style_user = "bg:sumi fg:fuji"
style_root = "bg:sumi fg:red"
format = '[ $user ]($style)'

[directory]
style = "fg:sumi bg:gold"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:spring"
format = '[[ $symbol $branch ](fg:sumi bg:spring)]($style)'

[git_status]
style = "bg:spring"
format = '[[($all_status$ahead_behind )](fg:sumi bg:spring)]($style)'

[nodejs]
symbol = ""
style = "bg:wave"
format = '[[ $symbol( $version) ](fg:fuji bg:wave)]($style)'

[c]
symbol = ""
style = "bg:wave"
format = '[[ $symbol( $version) ](fg:fuji bg:wave)]($style)'

[rust]
symbol = ""
style = "bg:wave"
format = '[[ $symbol( $version) ](fg:orange bg:wave)]($style)'

[golang]
symbol = ""
style = "bg:wave"
format = '[[ $symbol( $version) ](fg:blue bg:wave)]($style)'

[php]
symbol = ""
style = "bg:wave"
format = '[[ $symbol( $version) ](fg:purple bg:wave)]($style)'

[java]
symbol = ""
style = "bg:wave"
format = '[[ $symbol( $version) ](fg:red bg:wave)]($style)'

[kotlin]
symbol = ""
style = "bg:wave"
format = '[[ $symbol( $version) ](fg:purple bg:wave)]($style)'

[haskell]
symbol = ""
style = "bg:wave"
format = '[[ $symbol( $version) ](fg:blue bg:wave)]($style)'

[python]
symbol = ""
style = "bg:wave"
format = '[[ $symbol( $version) ](fg:gold bg:wave)]($style)'

[docker_context]
symbol = ""
style = "bg:dragon"
format = '[[ $symbol( $context) ](fg:teal bg:dragon)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:lotus"
format = '[[  $time ](fg:sumi bg:lotus)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:spring)'
error_symbol = '[](bold fg:red)'
vimcmd_symbol = '[](bold fg:blue)'
vimcmd_replace_one_symbol = '[](bold fg:purple)'
vimcmd_replace_symbol = '[](bold fg:purple)'
vimcmd_visual_symbol = '[](bold fg:gold)'
