"$schema" = 'https://starship.rs/config-schema.json'

format = """
[î‚¶](color_sumi)\
$os\
$username\
[î‚°](bg:color_wave fg:color_sumi)\
$directory\
[î‚°](fg:color_wave bg:color_spring)\
$git_branch\
$git_status\
[î‚°](fg:color_spring bg:color_crystalBlue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[î‚°](fg:color_crystalBlue bg:color_autumnRed)\
$docker_context\
$conda\
$pixi\
[î‚°](fg:color_autumnRed bg:color_pearlWhite)\
$time\
[î‚´ ](fg:color_pearlWhite)\
$line_break$character"""

palette = 'kanagawa_dragon'

[palettes.kanagawa_dragon]
color_fg0 = '#dcd7ba'   # base text (pearl)
color_sumi = '#1f1f28'  # deep background
color_wave = '#223249'  # dark blue
color_spring = '#2a4b3c' # muted green
color_crystalBlue = '#2d4f67' # steel blue
color_autumnRed = '#e46876' # warm accent
color_yellow = '#c4b28a' # soft gold
color_peach = '#ffa066'  # highlight amber
color_pearlWhite = '#c8c093' # light foreground

[os]
disabled = false
style = "bg:color_sumi fg:color_fg0"

[os.symbols]
Windows = "َ°چ²"
Ubuntu = "َ°•ˆ"
SUSE = "ïŒ”"
Raspbian = "َ°گ؟"
Mint = "َ°£­"
Macos = "َ°€µ"
Manjaro = "ïŒ’"
Linux = "َ°Œ½"
Arch = "َ°£‡"
Debian = "َ°£ڑ"

[username]
show_always = true
style_user = "bg:color_sumi fg:color_fg0"
style_root = "bg:color_autumnRed fg:color_sumi"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_wave"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "â€¦/"

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = "ï€™ "
"Music" = "َ°‌ڑ "
"Pictures" = "ï€¾ "
"Developer" = "َ°²‹ "

[git_branch]
symbol = "ïگک"
style = "bg:color_spring"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_spring)]($style)'

[git_status]
style = "bg:color_spring"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_spring)]($style)'

[nodejs]
symbol = "îœک"
style = "bg:color_crystalBlue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_crystalBlue)]($style)'

[bun]
symbol = "î‌¯"
style = "bg:color_crystalBlue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_crystalBlue)]($style)'

[c]
symbol = "îک‍ "
style = "bg:color_crystalBlue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_crystalBlue)]($style)'

[cpp]
symbol = "îک‌ "
style = "bg:color_crystalBlue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_crystalBlue)]($style)'

[rust]
symbol = "î‍¨"
style = "bg:color_crystalBlue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_crystalBlue)]($style)'

[golang]
symbol = "îک§"
style = "bg:color_crystalBlue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_crystalBlue)]($style)'

[php]
symbol = "îکˆ"
style = "bg:color_crystalBlue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_crystalBlue)]($style)'

[java]
symbol = "î‰–"
style = "bg:color_crystalBlue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_crystalBlue)]($style)'

[kotlin]
symbol = "îک´"
style = "bg:color_crystalBlue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_crystalBlue)]($style)'

[haskell]
symbol = "îکں"
style = "bg:color_crystalBlue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_crystalBlue)]($style)'

[python]
symbol = "îک†"
style = "bg:color_crystalBlue"
