palette = "kanagawa_dragon"

[palettes.kanagawa_dragon]
base      = "#0d0c0c"   # sumi ink
surface0  = "#181616"   # dragon background
surface1  = "#282727"
text       = "#dcd7ba"  # parchment
subtext    = "#c5c9c5"  # fog

red        = "#c4746e"
green      = "#8a9a7b"
yellow     = "#c4b28a"
blue       = "#7fb4ca"
purple     = "#938aa9"
teal       = "#7aa89f"
orange     = "#e6c384"

bright_red    = "#e46876"
bright_green  = "#87a987"
bright_yellow = "#e6c384"

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Macos = "¾░ÇÁ"
Linux = "¾░î¢"
Arch = "¾░úç"
Ubuntu = "¾░òê"
Windows = "¾░ì▓"

[username]
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:red"
format = '[ $user ]($style)'

[directory]
style = "fg:base bg:yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[git_branch]
symbol = "´Éÿ"
style = "bg:green"
format = '[[ $symbol $branch ](fg:base bg:green)]($style)'

[git_status]
style = "bg:green"
format = '[[($all_status$ahead_behind )](fg:base bg:green)]($style)'

[nodejs]
symbol = "¯£ÿ"
style = "bg:teal"
format = '[[ $symbol( $version ) ](fg:base bg:teal)]($style)'

[c]
symbol = "¯ÿ×"
style = "bg:teal"
format = '[[ $symbol( $version ) ](fg:base bg:teal)]($style)'

[rust]
