[conda]
style = "bg:color_autumnRed"
format = '[[ $symbol( $environment) ](fg:color_sumi bg:color_autumnRed)]($style)'

[pixi]
style = "bg:color_autumnRed"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_autumnRed)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_pearlWhite"
format = '[[ ïگ؛ $time ](fg:color_sumi bg:color_pearlWhite)]($style)'

[line_break]
disabled = false

[character]
success_symbol = '[ïگ²](bold fg:color_spring)'
error_symbol = '[ïگ²](bold fg:color_autumnRed)'
vimcmd_symbol = '[ïگ´](bold fg:color_spring)'
vimcmd_replace_one_symbol = '[ïگ´](bold fg:color_yellow)'
vimcmd_replace_symbol = '[ïگ´](bold fg:color_yellow)'
vimcmd_visual_symbol = '[ïگ´](bold fg:color_peach)'
