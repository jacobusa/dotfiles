"$schema" = 'https://starship.rs/config-schema.json'

format = """
[î‚¶](color_sumi)\
$os\
$username\
[î‚°](bg:color_winter fg:color_sumi)\
$directory\
[î‚°](fg:color_winter bg:color_wave)\
$git_branch\
$git_status\
[î‚°](fg:color_wave bg:color_sumi2)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[î‚°](fg:color_sumi2 bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[î‚°](fg:color_bg3 bg:color_bg1)\
$time\
[î‚´ ](fg:color_bg1)\
$line_break$character"""

palette = 'kanagawa_dragon'

[palettes.kanagawa_dragon]
color_fg0   = '#c8c093'

# core surfaces (dragon sumi layers)
color_sumi   = '#0d0c0c'
color_sumi2  = '#16161d'
color_bg1    = '#1f1f28'
color_bg3    = '#2a2a37'

# structural accents (muted steel/ink hues)
color_winter = '#223249'
color_wave   = '#2d4f67'

# semantic accents (very restrained)
color_green  = '#8a9a7b'
color_red    = '#c4746e'
color_blue   = '#8ba4b0'
color_yellow = '#c4b28a'
color_purple = '#a292a3'
color_aqua   = '#7aa89f'
color_orange = '#e6c384'

[os]
disabled = false
style = "bg:color_sumi fg:color_fg0"

[os.symbols]
Windows = "َ°چ²"
Ubuntu = "َ°•ˆ"
Macos = "َ°€µ"
Linux = "َ°Œ½"
Arch = "َ°£‡"

[username]
show_always = true
style_user = "bg:color_sumi fg:color_fg0"
style_root = "bg:color_sumi fg:color_red"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_winter"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "â€¦/"

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = "ï€™ "
"Music" = "َ°‌ڑ "
"Pictures" = "ï€¾ "
"Developer" = "َ°²‹ "

[git_branch]
symbol = "ïگک"
style = "bg:color_wave"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_wave)]($style)'

[git_status]
style = "bg:color_wave"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_wave)]($style)'

[nodejs]
symbol = "îœک"
style = "bg:color_sumi2"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_sumi2)]($style)'

[bun]
symbol = "î‌¯"
style = "bg:color_sumi2"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_sumi2)]($style)'

[c]
symbol = "îک‍ "
style = "bg:color_sumi2"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_sumi2)]($style)'

[cpp]
symbol = "îک‌ "
style = "bg:color_sumi2"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_sumi2)]($style)'

[rust]
symbol = "î‍¨"
style = "bg:color_sumi2"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_sumi2)]($style)'

[golang]
symbol = "îک§"
style = "bg:color_sumi2"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_sumi2)]($style)'

[php]
symbol = "îکˆ"
style = "bg:color_sumi2"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_sumi2)]($style)'

[java]
symbol = "î‰–"
style = "bg:color_sumi2"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_sumi2)]($style)'

[kotlin]
symbol = "îک´"
style = "bg:color_sumi2"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_sumi2)]($style)'

[haskell]
symbol = "îکں"
style = "bg:color_sumi2"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_sumi2)]($style)'

[python]
symbol = "îک†"
style = "bg:color_sumi2"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_sumi2)]($style)'

[docker_context]
symbol = "ïŒˆ"
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:color_aqua bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:color_aqua bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[ ïگ؛ $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
success_symbol = '[ïگ²](bold fg:color_green)'
error_symbol = '[ïگ²](bold fg:color_red)'
vimcmd_symbol = '[ïگ´](bold fg:color_green)'
vimcmd_replace_one_symbol = '[ïگ´](bold fg:color_purple)'
vimcmd_replace_symbol = '[ïگ´](bold fg:color_purple)'
vimcmd_visual_symbol = '[ïگ´](bold fg:color_yellow)'
